<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Library MS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <i class="fas fa-book-reader fa-2x" style="color: var(--primary);"></i>
                <h2>LibMaster</h2>
            </div>

            <ul class="nav-links">
                <li class="nav-item">
                    <a href="index.html" class="nav-link active">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="books.html" class="nav-link">
                        <i class="fas fa-book"></i>
                        <span>Books</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="issued.html" class="nav-link">
                        <i class="fas fa-exchange-alt"></i>
                        <span>Issue/Return</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="members.html" class="nav-link">
                        <i class="fas fa-users"></i>
                        <span>Members</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="profile.html" class="nav-link">
                        <i class="fas fa-user-circle"></i>
                        <span>Profile</span>
                    </a>
                </li>
            </ul>

            <div class="nav-item">
                <a href="#" class="nav-link" id="logout-btn" style="color: var(--danger);">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <nav class="top-navbar">
                <div class="search-bar">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" placeholder="Search anything...">
                </div>

                <div class="nav-actions">
                    <div class="notification-icon" style="position: relative; cursor: pointer;">
                        <i class="far fa-bell" style="font-size: 1.2rem; color: var(--text-muted);"></i>
                        <span
                            style="position: absolute; top: -5px; right: -5px; width: 10px; height: 10px; background: var(--danger); border-radius: 50%;"></span>
                    </div>

                    <button class="theme-toggle">
                        <i class="fas fa-moon"></i>
                    </button>

                    <div class="profile-avatar">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=6C63FF&color=fff"
                            alt="Profile">
                    </div>

                    <span id="nav-user-name" style="font-weight: 500;">Admin</span>
                </div>
            </nav>

            <!-- Dashboard Content -->
            <section class="dashboard-content animate-fade-in">
                <div class="header-box" style="margin-bottom: 2rem;">
                    <h1>Overview</h1>
                    <p class="text-muted">Welcome back, here's what's happening today.</p>
                </div>

                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="card stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #6C63FF 0%, #8f88ff 100%);">
                            <i class="fas fa-book"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-total-books">0</h3>
                            <p>Total Books</p>
                        </div>
                    </div>

                    <div class="card stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #00BFA6 0%, #4ae0c8 100%);">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-members">0</h3>
                            <p>Total Members</p>
                        </div>
                    </div>

                    <div class="card stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #FFC107 0%, #ffe082 100%);">
                            <i class="fas fa-book-reader"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-issued">0</h3>
                            <p>Issued Books</p>
                        </div>
                    </div>

                    <div class="card stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #FF5252 0%, #ff8a80 100%);">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-overdue">0</h3>
                            <p>Overdue</p>
                        </div>
                    </div>
                </div>

                <!-- Charts Section -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem;">
                    <div class="card">
                        <h3 style="margin-bottom: 1.5rem;">Books by Category</h3>
                        <canvas id="categoryChart"></canvas>
                    </div>

                    <div class="card">
                        <h3 style="margin-bottom: 1.5rem;">Issue vs Return</h3>
                        <canvas id="issueChart"></canvas>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Load Data for Stats
            const books = Storage.get(DB_KEYS.BOOKS) || [];
            const members = Storage.get(DB_KEYS.MEMBERS) || [];
            const issued = Storage.get(DB_KEYS.ISSUED) || [];

            document.getElementById('stat-total-books').textContent = books.length;
            document.getElementById('stat-members').textContent = members.length;
            document.getElementById('stat-issued').textContent = issued.filter(i => i.status === 'Issued').length;
            document.getElementById('stat-overdue').textContent = issued.filter(i => i.status === 'Overdue').length; // Logic to update later

            // Chart 1: Categories
            const categories = {};
            books.forEach(b => {
                categories[b.category] = (categories[b.category] || 0) + 1;
            });

            const ctx1 = document.getElementById('categoryChart').getContext('2d');
            new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categories),
                    datasets: [{
                        data: Object.values(categories),
                        backgroundColor: ['#6C63FF', '#00BFA6', '#FFC107', '#FF5252', '#3498db'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });

            // Chart 2: Availability
            const availableBooks = books.reduce((acc, b) => acc + parseInt(b.available), 0);
            const issuedCount = issued.filter(i => i.status === 'Issued').length;

            const ctx2 = document.getElementById('issueChart').getContext('2d');
            new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ['Available', 'Issued'],
                    datasets: [{
                        label: 'Books Status',
                        data: [availableBooks, issuedCount],
                        backgroundColor: ['#00BFA6', '#FF5252'],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        });
    </script>
</body>

</html>
